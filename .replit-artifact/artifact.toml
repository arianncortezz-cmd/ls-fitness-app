kind = "web"
previewPath = "/"
title = "LS Fitness"
version = "1.0.0"
id = "artifacts/ls-fitness"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22983

[services.development]
run = "pnpm --filter @workspace/ls-fitness run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ls-fitness", "run", "build" ]
publicDir = "artifacts/ls-fitness/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22983"
BASE_PATH = "/"
